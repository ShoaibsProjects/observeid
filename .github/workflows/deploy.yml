name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"
  FLY_APP: "observeid-api"

jobs:
  # ─── Job 1: Test Backend ─────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: observeid
          POSTGRES_USER: observeid
          POSTGRES_PASSWORD: observeid
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U observeid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_AUTH: neo4j/observeid123
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        ports:
          - 7687:7687
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.1"

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Protobuf
        run: make proto

      - name: Vet
        run: cd backend && go vet ./...

      - name: Build
        run: cd backend && go build ./...

      - name: Test
        run: cd backend && go test -v -race -count=1 ./...
        env:
          DATABASE_URL: postgresql://observeid:observeid@localhost:5432/observeid?sslmode=disable
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: observeid123

  # ─── Job 2: Test Frontend ────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://observeid-api.fly.dev' }}
          CI: false

  # ─── Job 3: Deploy Backend to Fly.io ─────────────────────
  deploy-backend:
    name: Deploy Backend (Fly.io)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ─── Job 4: Deploy Frontend to Cloudflare Pages ──────────
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://observeid-api.fly.dev' }}
          CI: false

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy out --project-name=observeid-frontend
          workingDirectory: frontend
          packageManager: npm
